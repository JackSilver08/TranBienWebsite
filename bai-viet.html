<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FAF8F2" />
  <title>Bài viết — Trấn Biên Web</title>
  <meta name="description" content="Bài viết chia sẻ kiến thức về website, landing page và chuyển đổi số từ Trấn Biên Web." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5 (grid + responsive utilities) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css?v=20260621-article-footer" />
  <link rel="icon" type="image/png" href="assets/TranBienWeb Icon.png" />
</head>
<body class="page-article">

  <!-- Decorative background layers -->
  <div class="bg-layer">
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-blob bg-blob--blue" aria-hidden="true"></div>
    <div class="bg-blob bg-blob--gold" aria-hidden="true"></div>
    <canvas id="particles" aria-hidden="true"></canvas>
  </div>

  <!-- ===== NAVBAR ===== -->
  <header class="nav" id="nav">
    <div class="container nav__inner">
      <a class="nav__brand" href="index.html" aria-label="Trấn Biên Web">
        <img src="assets/logo-trim.png" alt="Trấn Biên Web" class="nav__logo" />
      </a>

      <nav class="nav__links" id="navLinks">
        <div class="nav__panel-head">
          <button class="nav__close" id="navClose" aria-label="Đóng menu">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
        </div>
        <a href="index.html#services">Dịch vụ</a>
        <a href="index.html#portfolio">Dự án</a>
        <a href="index.html#process">Quy trình</a>
        <a href="index.html#articles">Bài viết</a>
        <a href="index.html#contact">Liên hệ</a>
      </nav>

      <div class="nav__actions">
        <button class="nav__toggle" id="navToggle" aria-label="Mở menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- Mobile sidebar backdrop -->
  <div class="nav__overlay" id="navOverlay" aria-hidden="true"></div>

  <!-- ===== ARTICLE ===== -->
  <main id="top">
    <section class="post">
      <div class="container">
        <div class="post__inner">
          <a class="post__back" href="index.html#articles">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M19 12H5M11 6l-6 6 6 6"/></svg>
            Tất cả bài viết
          </a>

          <p class="post__state" id="postState">Đang tải bài viết...</p>

          <article id="postArticle" hidden>
            <span class="post__crumb" id="postCrumb"></span>
            <h1 class="post__title" id="postTitle"></h1>
            <div class="post__meta">
              <span class="post__chip" id="postMetaKeyword"></span>
              <span id="postMetaDate"></span>
              <span id="postMetaRead"></span>
            </div>
            <figure class="post__cover" id="postCover" hidden>
              <img id="postCoverImg" src="" alt="" />
            </figure>
            <div class="post__body" id="postBody"></div>

            <div class="post__cta">
              <h3>Cần một website chuyên nghiệp?</h3>
              <p>Trấn Biên Web thiết kế website, landing page và phần mềm nội bộ cho doanh nghiệp.</p>
              <a href="index.html#contact" class="btn btn--gold">Tư vấn miễn phí</a>
            </div>
          </article>
        </div>
      </div>
    </section>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="article-footer">
    <div class="container">
      <span>Mọi bản quyền thuộc về Trấn Biên Web</span>
    </div>
  </footer>

  <script src="js/admin-config.js?v=20260620-seo-admin-api-fixed"></script>
  <script src="js/bai-viet.js?v=20260620-fetch"></script>
  <script src="js/main.js?v=20260619-sidebar-refresh"></script>
</body>
</html>
